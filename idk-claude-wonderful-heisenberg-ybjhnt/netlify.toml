# Netlify deployment config.
# The site is pre-built plain HTML, so there is no build step to run —
# we just publish the repo root. Security/caching headers live in /_headers.

[build]
  publish = "."
  command = "python3 build/build.py"

# Netlify automatically serves /404.html for unmatched routes.

